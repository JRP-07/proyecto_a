<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InclusionHub | Panel Corporativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link.active { @apply bg-emerald-600 text-white shadow-md; }
        
        .modal { display: none; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="flex flex-col">
                    <span id="company-name-nav" class="text-lg font-bold text-emerald-900 leading-none">Cargando...</span>
                    <span id="company-sector-nav" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sector</span>
                </div>
            </div>

            <div class="hidden md:flex bg-slate-100 p-1 rounded-xl">
                <button onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link active px-4 py-2 rounded-lg text-sm font-bold transition-all">Inicio</button>
                <button onclick="showPage('post')" id="nav-post" class="nav-link px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-500">Publicar</button>
            </div>

            <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors p-2">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Dashboard -->
        <section id="page-dashboard" class="page active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-black uppercase text-slate-400 mb-1">Vacantes Publicadas</p>
                        <p id="total-vacancies" class="text-4xl font-black text-emerald-600">0</p>
                    </div>
                    <div class="p-5 bg-emerald-50 text-emerald-600 rounded-2xl">
                        <i class="fas fa-briefcase text-2xl"></i>
                    </div>
                </div>

                <div class="bg-emerald-600 p-6 rounded-3xl text-white shadow-lg shadow-emerald-100 flex flex-col justify-center">
                    <h3 class="font-bold">Gestión de Talento</h3>
                    <p class="text-xs opacity-90">Haz clic en tus vacantes para ver los datos completos de los aspirantes compatibles.</p>
                </div>
            </div>

            <h2 class="text-2xl font-black text-slate-800 mb-6">Tus Vacantes Activas</h2>
            <div id="company-jobs-list" class="grid gap-4">
                <!-- Se llena dinámicamente -->
            </div>
        </section>

        <!-- Publicar -->
        <section id="page-post" class="page">
             <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-black text-slate-800">Nueva Oferta de Empleo</h2>
                </div>
                <form id="postJobForm" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-1 ml-2">Título del Puesto</label>
                        <input type="text" id="job-title" required placeholder="Ej: Analista Contable" class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-emerald-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-1 ml-2">Accesibilidad Requerida</label>
                        <select id="job-access" required class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-emerald-500 transition-all bg-white">
                            <option value="Cualquiera">Cualquiera / Universal</option>
                            <option value="Movilidad Reducida">Movilidad Reducida</option>
                            <option value="Visual">Visual</option>
                            <option value="Auditiva">Auditiva</option>
                            <option value="Neurodivergencia">Neurodivergencia</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-1 ml-2">Descripción</label>
                        <textarea id="job-desc" required placeholder="Describe las tareas y requisitos..." class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-emerald-500 transition-all h-32"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black transition-all hover:bg-emerald-700">Publicar Vacante</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Modal de Detalles de Vacante y Candidatos -->
    <div id="jobModal" class="modal fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-white max-w-2xl w-full rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-8 border-b border-slate-100 flex justify-between items-start bg-emerald-50">
                <div>
                    <h3 id="modal-job-title" class="text-2xl font-black text-emerald-900">Título de Vacante</h3>
                    <div class="flex gap-2 mt-2">
                        <span id="modal-job-access" class="bg-emerald-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase">Acceso</span>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto custom-scrollbar">
                <div class="mb-8">
                    <h4 class="text-[10px] font-black uppercase text-slate-400 mb-2">Descripción del Puesto</h4>
                    <p id="modal-job-desc" class="text-slate-600 text-sm leading-relaxed"></p>
                </div>

                <div class="pt-6 border-t border-slate-100">
                    <h4 class="text-[10px] font-black uppercase text-emerald-600 mb-4 flex items-center gap-2">
                        <i class="fas fa-users"></i> Candidatos Compatibles (Datos del Aspirante)
                    </h4>
                    <div id="modal-candidates-list" class="space-y-4">
                        <!-- Candidatos dinámicos -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCompany = null;

        function loadSession() {
            const session = sessionStorage.getItem('current_company');
            if(!session) {
                currentCompany = { id: 1, name: "Empresa Demo", sector: "Tecnología" };
                sessionStorage.setItem('current_company', JSON.stringify(currentCompany));
            } else {
                currentCompany = JSON.parse(session);
            }
            
            document.getElementById('company-name-nav').innerText = currentCompany.name;
            document.getElementById('company-sector-nav').innerText = currentCompany.sector;
            renderMyJobs();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active', 'bg-emerald-600', 'text-white');
                link.classList.add('text-slate-500');
            });
            document.getElementById(`nav-${pageId}`).classList.add('active', 'bg-emerald-600', 'text-white');
        }

        function openJobDetails(jobId) {
            const allJobs = JSON.parse(localStorage.getItem('hub_jobs')) || [];
            const job = allJobs.find(j => j.id === jobId);
            if(!job) return;

            document.getElementById('modal-job-title').innerText = job.title;
            document.getElementById('modal-job-access').innerText = job.access;
            document.getElementById('modal-job-desc').innerText = job.desc;

            // Obtener candidatos reales del localStorage
            const candidates = JSON.parse(localStorage.getItem('hub_candidates')) || [];
            
            // Filtramos candidatos según la accesibilidad de la vacante
            const matchingCandidates = candidates.filter(c => 
                job.access === 'Cualquiera' || c.disability === job.access
            );

            const listCont = document.getElementById('modal-candidates-list');
            if(matchingCandidates.length === 0) {
                listCont.innerHTML = `
                    <div class="bg-slate-50 p-6 rounded-2xl border border-dashed border-slate-200 text-center">
                        <p class="text-xs text-slate-400 italic">No hay candidatos registrados con el perfil de accesibilidad "${job.access}" actualmente.</p>
                    </div>`;
            } else {
                listCont.innerHTML = matchingCandidates.map(c => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:border-emerald-200 transition-all">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center font-black text-xl">
                                    ${c.name[0]}
                                </div>
                                <div>
                                    <p class="text-lg font-black text-slate-800 leading-tight">${c.name}</p>
                                    <p class="text-[10px] text-emerald-600 font-black uppercase tracking-widest mt-1">${c.disability}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${c.linkedin ? `<a href="${c.linkedin}" target="_blank" class="w-8 h-8 bg-slate-100 text-slate-400 rounded-lg flex items-center justify-center hover:bg-emerald-600 hover:text-white transition-all"><i class="fab fa-linkedin-in text-xs"></i></a>` : ''}
                                <a href="mailto:${c.email || 'hola@inclusionhub.com'}" class="w-8 h-8 bg-slate-100 text-slate-400 rounded-lg flex items-center justify-center hover:bg-emerald-600 hover:text-white transition-all"><i class="fas fa-envelope text-xs"></i></a>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-slate-50 p-3 rounded-xl">
                                <p class="text-[9px] font-black text-slate-400 uppercase">Discapacidad</p>
                                <p class="text-xs font-bold text-slate-700">${c.disability || 'No proporcionado'}</p>
                                <!-- <p class="text-[10px] text-slate-500">${c.disability || ''}</p> -->
                            </div>
                            <div class="bg-slate-50 p-3 rounded-xl">
                                <p class="text-[9px] font-black text-slate-400 uppercase">Habilidades</p>
                                <p class="text-xs font-bold text-slate-700 truncate">${c.skills || 'General'}</p>
                            </div>
                        </div>

                        <button onclick="alert('Iniciando proceso con ${c.name}...')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-600 transition-all">
                            Ver Perfil Completo
                        </button>
                    </div>
                `).join('');
            }

            document.getElementById('jobModal').classList.add('active');
        }

        function deleteJob(e, jobId) {
            e.stopPropagation(); 
            if(confirm("¿Estás seguro de que deseas eliminar esta vacante?")) {
                let allJobs = JSON.parse(localStorage.getItem('hub_jobs')) || [];
                allJobs = allJobs.filter(j => j.id !== jobId);
                localStorage.setItem('hub_jobs', JSON.stringify(allJobs));
                renderMyJobs();
            }
        }

        function closeModal() {
            document.getElementById('jobModal').classList.remove('active');
        }

        function renderMyJobs() {
            const allJobs = JSON.parse(localStorage.getItem('hub_jobs')) || [];
            const myJobs = allJobs.filter(j => j.companyId === currentCompany.id);
            
            const container = document.getElementById('company-jobs-list');
            document.getElementById('total-vacancies').innerText = myJobs.length;

            if(myJobs.length === 0) {
                container.innerHTML = `<div class="p-10 border-2 border-dashed border-slate-200 rounded-3xl text-center text-slate-400">No has publicado ninguna vacante todavía.</div>`;
                return;
            }

            container.innerHTML = myJobs.map(j => `
                <div onclick="openJobDetails(${j.id})" class="bg-white p-6 rounded-2xl border border-slate-200 flex justify-between items-center hover:border-emerald-500 hover:shadow-md transition-all cursor-pointer group">
                    <div class="flex-1">
                        <h4 class="font-bold text-lg text-emerald-900 group-hover:text-emerald-600">${j.title}</h4>
                        <div class="flex gap-3 mt-1">
                            <p class="text-xs text-slate-400"><i class="far fa-calendar-alt mr-1"></i> ${j.date}</p>
                            <p class="text-xs font-bold text-emerald-600 uppercase tracking-tighter"><i class="fas fa-universal-access mr-1"></i> ${j.access}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="hidden sm:inline-block bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-[10px] font-black uppercase">Activa</span>
                        <button onclick="deleteJob(event, ${j.id})" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        <i class="fas fa-chevron-right text-slate-300 group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('postJobForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('job-title').value;
            const desc = document.getElementById('job-desc').value;
            const access = document.getElementById('job-access').value;

            const newJob = {
                id: Date.now(),
                companyId: currentCompany.id,
                companyName: currentCompany.name,
                title: title,
                desc: desc,
                access: access,
                date: new Date().toLocaleDateString()
            };

            const allJobs = JSON.parse(localStorage.getItem('hub_jobs')) || [];
            allJobs.unshift(newJob);
            localStorage.setItem('hub_jobs', JSON.stringify(allJobs));

            e.target.reset();
            renderMyJobs();
            showPage('dashboard');
        });

        function logout() {
            sessionStorage.removeItem('current_company');
            window.location.href = 'inicio_empresas.html';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('jobModal')) closeModal();
        }

        window.onload = loadSession;
    </script>
</body>
</html>
