<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habilly | Acceso Empresas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .modal { display: none; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #registerModal::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- Encabezado con Navegación Global -->
    <header class="bg-white border-b border-slate-200 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            
            <!-- Logo e Inicio -->
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-lg shadow-indigo-100">
                        <img src="recursos/logo2.png" alt="Logo Habilly" class="w-20 h-20 object-contain"
                            onerror="this.onerror=null; this.innerHTML='<i class=\'fas fa-handshake-angle text-white\'></i>'; this.type='hidden';">
                    </div>
                    <h1 class="text-2xl font-black text-indigo-900 tracking-tight">Habilly</h1>
                </div>
                
                <div class="h-6 w-[1px] bg-slate-200 hidden md:block mx-2"></div>
                
                <!-- <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-slate-400 hover:text-indigo-600 font-bold text-sm transition-all group">
                    <i class="fas fa-home text-lg"></i>
                    <span>Inicio</span>
                </button> -->
            </div>

            <!-- Selectores de Portal -->
            <div class="flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl w-full md:w-auto">
                <button onclick="window.location.href='index.html'" 
                    class="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2.5 text-slate-500 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-white hover:text-indigo-600 transition-all">
                    <i class="fas fa-user"></i>
                    Aspirantes
                </button>

                <button onclick="window.location.href='inicio_empresas.html'" 
                    class="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2.5 bg-white text-emerald-600 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm border border-slate-200 transition-all">
                    <i class="fas fa-building"></i>
                    Empresas
                </button>
            </div>
        </div>
    </header>

    <!-- Formulario de Acceso -->
    <main class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-[3rem] p-10 shadow-2xl shadow-slate-200/50 border border-slate-100 relative">
            
            <div class="text-center mb-10">
                <div class="inline-flex p-5 bg-emerald-50 text-emerald-600 rounded-[2rem] mb-4">
                    <i class="fas fa-city text-4xl"></i>
                </div>
                <h2 class="text-3xl font-black text-slate-800">Panel Corporativo</h2>
                <p class="text-slate-400 text-sm mt-2 font-medium">Gestiona tu talento inclusivo hoy</p>
            </div>

            <!-- Mensaje de Error (Oculto por defecto) -->
            <div id="error-msg" class="hidden mb-6 p-4 bg-red-50 text-red-600 rounded-2xl border border-red-100 text-xs font-bold flex items-center gap-2 animate-bounce">
                <i class="fas fa-exclamation-circle"></i>
                <span>Credenciales incorrectas o empresa no registrada.</span>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase text-slate-400 ml-2 tracking-[0.2em]">Email de Empresa</label>
                    <div class="relative group">
                        <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-emerald-500 transition-colors"></i>
                        <input type="email" id="login-email" required placeholder="ejemplo@empresa.com" 
                               class="w-full pl-12 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all font-medium">
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase text-slate-400 ml-2 tracking-[0.2em]">Contraseña</label>
                    <div class="relative group">
                        <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-emerald-500 transition-colors"></i>
                        <input type="password" id="login-password" required placeholder="••••••••" 
                               class="w-full pl-12 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all font-medium">
                    </div>
                </div>

                <button type="submit" id="login-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-emerald-200 hover:bg-emerald-700 transform hover:-translate-y-1 transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-3">
                    <span>Entrar al Panel</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-50 text-center">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-3">¿Eres una nueva empresa?</p>
                <button onclick="toggleModal(true)" class="text-emerald-600 font-black text-sm uppercase hover:text-emerald-700 transition-colors flex items-center justify-center gap-2 mx-auto">
                    <i class="fas fa-plus-circle"></i>
                    Registrar mi Organización
                </button>
            </div>
        </div>
    </main>

    <!-- Modal de Registro -->
    <div id="registerModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[60] items-center justify-center p-4">
        <div class="bg-white max-w-lg w-full rounded-[2.5rem] p-10 text-slate-900 shadow-2xl relative">
            <button onclick="toggleModal(false)" class="absolute top-8 right-8 text-slate-300 hover:text-slate-600 transition-colors">
                <i class="fas fa-times text-2xl"></i>
            </button>
            
            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-800">Registro de Partner</h2>
                <p class="text-slate-400 text-sm font-medium mt-1">Crea tu cuenta corporativa.</p>
            </div>

            <form id="registerForm" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Razón Social</label>
                        <input type="text" id="reg-name" required placeholder="Nombre Empresa" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Sector</label>
                        <select id="reg-sector" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 bg-white font-medium">
                            <option>Tecnología</option>
                            <option>Retail</option>
                            <option>Banca / Seguros</option>
                            <option>Logística</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Email de Contacto</label>
                    <input type="email" id="reg-email" required placeholder="rrhh@empresa.com" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="Mínimo 8 caracteres" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:border-emerald-500 transition-all font-medium">
                </div>
                
                <button type="submit" id="reg-submit-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black hover:bg-emerald-600 transition-all uppercase tracking-[0.2em] text-[10px] mt-2">
                    Finalizar Registro
                </button>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('registerModal');
            if(show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }

        // Manejo del Login ESTRICTO
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const errorBox = document.getElementById('error-msg');
            
            errorBox.classList.add('hidden'); // Ocultar error anterior

            // Buscar en la base de datos local
            const companies = JSON.parse(localStorage.getItem('hub_companies')) || [];
            const company = companies.find(c => c.email === email && c.password === password);
            
            if(company) {
                // Éxito: Guardar sesión y redirigir
                sessionStorage.setItem('current_company', JSON.stringify(company));
                
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> <span>CONECTANDO...</span>';
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = 'empresa.html';
                }, 800);
            } else {
                // Fallo: Mostrar error y NO redirigir
                errorBox.classList.remove('hidden');
                document.getElementById('login-password').value = ''; // Limpiar contraseña por seguridad
            }
        });

        // Manejo del Registro
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('reg-submit-btn');
            const email = document.getElementById('reg-email').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const password = document.getElementById('reg-password').value;

            const companies = JSON.parse(localStorage.getItem('hub_companies')) || [];
            
            if(companies.some(c => c.email === email)) {
                alert("Este correo ya está registrado.");
                return;
            }

            companies.push({
                id: 'comp_' + Date.now(),
                name: name,
                sector: document.getElementById('reg-sector').value,
                email: email,
                password: password // Guardamos la contraseña para validarla luego
            });
            
            localStorage.setItem('hub_companies', JSON.stringify(companies));

            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            setTimeout(() => {
                toggleModal(false);
                document.getElementById('login-email').value = email;
                alert("¡Registro exitoso! Ahora puedes entrar con tu contraseña.");
                btn.innerText = "Finalizar Registro";
                btn.disabled = false;
                e.target.reset();
            }, 800);
        });

        window.onclick = function(event) {
            if (event.target == document.getElementById('registerModal')) toggleModal(false);
        }
    </script>
</body>
</html>
